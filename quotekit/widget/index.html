<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QuoteKit widget — dev harness</title>
  <style>
    /* Deliberately hostile host styles. If Shadow DOM isolation works, the
       widget below is completely unaffected by any of this. */
    * { font-family: "Comic Sans MS", cursive !important; }
    input, select, button { border: 5px dashed magenta !important; background: yellow !important; }
    div { letter-spacing: 4px; }
    body { background: #23303b; color: #fff; padding: 40px; max-width: 720px; margin: 0 auto; }
    h1 { letter-spacing: 0; }
  </style>
</head>
<body>
  <h1>Host page with hostile CSS</h1>
  <p>Everything on this page is Comic Sans with magenta borders — except the widget.</p>

  <script type="module" src="/src/main.js" data-config='{
    "title": "Concrete Driveway Cost Calculator",
    "plan": "free",
    "active": true,
    "theme": { "accent": "#CE4A12", "radius": 14 },
    "fields": [
      { "key": "sqft", "label": "Driveway size (sq ft)", "type": "number", "min": 50, "max": 5000, "step": 10, "default": 400 },
      { "key": "finish", "label": "Finish", "type": "select", "options": [
        { "label": "Broom finish", "value": 1 },
        { "label": "Exposed aggregate", "value": 1.25 },
        { "label": "Stamped &amp; colored", "value": 1.6 }
      ]},
      { "key": "removal", "label": "Remove existing concrete", "type": "checkbox", "checkedValue": 1, "uncheckedValue": 0 }
    ],
    "formula": "(sqft * rate) * finish + removal * (sqft * tearout) + base_fee",
    "constants": { "rate": 6.5, "tearout": 2.25, "base_fee": 150 },
    "result": { "prefix": "$", "decimals": 0, "label": "Estimated cost" },
    "leadCapture": { "enabled": true, "gate": true, "fields": ["name", "email", "phone"], "cta": "Reveal my quote", "successMessage": "Got it — full quote is in your inbox." }
  }'></script>

  <p style="margin-top:32px">A second, ungated widget on the same page:</p>

  <script type="module" src="/src/main.js" data-config='{
    "title": "Fence Installation Estimate",
    "plan": "pro",
    "active": true,
    "theme": { "accent": "#2B4C6F", "radius": 8 },
    "fields": [
      { "key": "feet", "label": "Linear feet", "type": "number", "min": 10, "max": 2000, "default": 120 },
      { "key": "style", "label": "Fence style", "type": "select", "options": [
        { "label": "Chain link", "value": 28 },
        { "label": "Wood privacy", "value": 45, "default": true },
        { "label": "Vinyl", "value": 62 }
      ]},
      { "key": "gates", "label": "Number of gates", "type": "number", "min": 0, "max": 6, "default": 1 }
    ],
    "formula": "feet * style + gates * gate_price",
    "constants": { "gate_price": 350 },
    "result": { "prefix": "$", "decimals": 0, "label": "Estimate" },
    "leadCapture": { "enabled": true, "gate": false, "fields": ["email"], "cta": "Email me this quote" }
  }'></script>
</body>
</html>
